name: Symfony CI/CD

on:
    push:
        branches: ["main", "develop"]
    pull_request:
        branches: ["main", "develop"]

jobs:
    symfony-tests:
        runs-on: ubuntu-latest

        steps:
            # 1. Récupérer le code du dépôt
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. Configurer la bonne version de PHP
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.2" # À adapter selon ta version
                  extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
                  coverage: none

            # 3. Vérifier le fichier composer.json
            - name: Validate composer.json
              run: composer validate --strict

            # 4. Gérer le cache pour accélérer les futures exécutions
            - name: Cache Composer packages
              id: composer-cache
              uses: actions/cache@v3
              with:
                  path: vendor
                  key: ${{ runner.os }}-node-${{ hashFiles('**/composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-node-

            # 5. Installer les dépendances PHP
            - name: Install Dependencies
              run: composer install --prefer-dist --no-progress --no-suggest

            # 6. Préparer l'environnement Symfony pour les tests
            - name: Build Symfony Cache & Env
              env:
                  APP_ENV: test
              run: |
                  php bin/console cache:clear
                  php bin/console cache:warmup

            # 7. Créer la base de données et charger les schémas/fixtures
            - name: Prepare Database for Tests
              env:
                  DATABASE_URL: "sqlite:///%kernel.project_dir%/var/test.db"
                  APP_ENV: test
              run: |
                  php bin/console doctrine:database:create --if-not-exists
                  php bin/console doctrine:schema:update --force
                  # Optionnel : décommente la ligne suivante si tu as des fixtures
                  # php bin/console doctrine:fixtures:load --no-interaction

            # 8. Exécuter les tests d'intégration (PHPUnit)
            - name: Run Tests
              env:
                  DATABASE_URL: "sqlite:///%kernel.project_dir%/var/test.db"
                  APP_ENV: test
              run: vendor/bin/phpunit
